name: Render Video

# Triggered by n8n via the GitHub API (repository_dispatch)
on:
  repository_dispatch:
    types: [render_job]

# Allow up to 4 simultaneous renders (one per video per day)
concurrency:
  group: render-${{ github.event.client_payload.filename }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 40  # safety ceiling; a normal render takes 8-15 min

    steps:
      # ── Checkout repo (gets fonts/ and music/ too) ────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps: FFmpeg + font support ───────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libsm6 \
            libxext6 \
            libgl1 \
            fonts-dejavu-core

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Cache pip packages (skips reinstall on subsequent runs) ───────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-build-isolation -r requirements.txt

      # ── Cache Whisper small model (~244 MB, takes 1-2 min to download) ───
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v1

      - name: Pre-load Whisper model (downloads if cache miss)
        run: python -c "import whisper; whisper.load_model('small')"

      # ── Run the assembler ─────────────────────────────────────────────────
      - name: Render video
        env:
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_SERVICE_JSON:    ${{ secrets.GOOGLE_SERVICE_JSON }}
          GDRIVE_OUTPUT_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          N8N_WEBHOOK_URL:        ${{ secrets.N8N_WEBHOOK_URL }}
          JOB_PAYLOAD:            ${{ toJson(github.event.client_payload) }}
        run: python run_job.py
